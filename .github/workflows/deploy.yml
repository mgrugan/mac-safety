name: Deploy to GitHub Pages

# Builds the Vite app and publishes the compiled output. GitHub Pages cannot
# build a Vite/React project on its own — "Deploy from a branch" would serve the
# raw source (index.html pointing at /src/main.tsx), which a browser cannot run,
# giving a blank page. This workflow runs the build and deploys the dist/ folder.

on:
  push:
    branches:
      - claude/field-project-tracker-1ed24c
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
